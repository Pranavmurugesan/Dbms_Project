spring.application.name=ecommerce-backend
server.port=8080

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=2077
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.ecommerce=DEBUG

# JWT
jwt.secret=your-secret-key-change-this-in-production-with-a-long-random-string-at-least-32-characters-long
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000
